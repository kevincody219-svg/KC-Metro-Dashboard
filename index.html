<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NC Metro Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f1f5;--sf:#fff;--sf2:#f7f8fa;--sf3:#eef0f4;--bd:#dce0e8;--tx:#1a1d2b;--txd:#555a6e;--txm:#8b8fa3;--ac:#2563eb;--acd:rgba(37,99,235,.08);--gn:#16a34a;--gnd:rgba(22,163,74,.08);--rd:#dc2626;--am:#d97706;--sbw:400px;--hh:52px;--bh:110px;--ft:'DM Sans',sans-serif;--mn:'JetBrains Mono',monospace}
body{font-family:var(--ft);background:var(--bg);color:var(--tx);height:100vh;overflow:hidden}
header{height:var(--hh);background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:1000;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:grid;place-items:center}
.brand-icon svg{width:16px;height:16px;fill:#fff}
.brand h1{font-size:14px;font-weight:700;letter-spacing:-.02em}
.brand .sub{font-size:10px;color:var(--txm);letter-spacing:.05em;text-transform:uppercase}
.metro-tabs{display:flex;gap:2px;background:var(--sf3);border-radius:8px;padding:3px}
.metro-tabs button{font-family:var(--ft);font-size:12px;font-weight:500;padding:5px 14px;border:none;background:none;color:var(--txd);border-radius:6px;cursor:pointer;transition:.2s;white-space:nowrap}
.metro-tabs button.active{background:var(--ac);color:#fff;box-shadow:0 1px 3px rgba(37,99,235,.3)}
.metro-tabs button:hover:not(.active){color:var(--tx);background:var(--sf)}
.ctrl{display:flex;align-items:center;gap:8px}
.ctrl label{font-size:10px;color:var(--txm);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.ctrl select{font-family:var(--ft);font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);cursor:pointer;outline:none}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:12px}
.tog{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txd);cursor:pointer;user-select:none}
.tog input{accent-color:var(--ac);width:13px;height:13px}
.app{display:flex;flex-direction:column;height:calc(100vh - var(--hh))}
.map-row{display:flex;flex:1;min-height:0}
#map{flex:1;background:var(--bg)}
.sb{width:var(--sbw);background:var(--sf);border-left:1px solid var(--bd);overflow-y:auto;flex-shrink:0}
.sb::-webkit-scrollbar{width:5px}.sb::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.sb-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px;text-align:center}
.sb-empty-ic{width:48px;height:48px;background:var(--acd);border-radius:14px;display:grid;place-items:center;margin-bottom:16px}
.sb-empty-ic svg{width:22px;height:22px;stroke:var(--ac);fill:none}
.sb-empty h3{font-size:15px;font-weight:600;margin-bottom:6px}
.sb-empty p{font-size:13px;color:var(--txd);line-height:1.6;max-width:240px}
#sbDetail{display:none}
.sb-hd{padding:18px 22px 14px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--sf);z-index:10}
.badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:6px}
.badge.nb{background:var(--acd);color:var(--ac)}.badge.tg{background:var(--gnd);color:var(--gn)}
.sb-hd h2{font-size:19px;font-weight:700;letter-spacing:-.03em;line-height:1.2}
.sb-towns{font-size:12px;color:var(--txd);margin-top:3px}
.sb-blurb{padding:14px 22px;font-size:13px;line-height:1.7;color:var(--txd);border-bottom:1px solid var(--bd)}
.sb-sec{padding:14px 22px}
.sb-sec-t{font-size:10px;font-weight:600;color:var(--txm);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sb-sec-t::after{content:'';flex:1;height:1px;background:var(--bd)}
.pop-row{display:flex;gap:8px;margin-bottom:10px}
.pop-c{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px}
.pop-c .l{font-size:10px;color:var(--txd);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.pop-c .v{font-family:var(--mn);font-size:17px;font-weight:600}
.mc{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s}
.mc:hover{border-color:var(--ac)}
.mc .ml{font-size:11px;color:var(--txd);margin-bottom:2px}
.mc .mv{font-family:var(--mn);font-size:18px;font-weight:600;letter-spacing:-.02em;display:flex;align-items:center;gap:5px}
.mc .arrow{font-size:11px;font-weight:700}
.mc .arrow.up{color:var(--gn)}.mc .arrow.down{color:var(--rd)}
.mc .mr{display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:88px}
.mc .mp{font-size:10px;color:var(--txm);font-family:var(--mn);white-space:nowrap}
.mb{width:88px;height:5px;background:var(--sf3);border-radius:3px;overflow:hidden}
.mbf{height:100%;border-radius:3px;transition:width .5s}
.nc{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;margin-bottom:7px}
.nc .nl{font-size:10px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.nc .nl .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nc .nt{font-size:12px;color:var(--txd);line-height:1.5}
.bc{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;margin-bottom:5px;transition:border-color .2s}
.bc:hover{border-color:var(--ac)}
.bc .bi{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex-shrink:0;font-size:14px;background:rgba(234,88,12,.08)}
.binfo{flex:1;min-width:0}
.binfo .bn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.binfo .bm{font-size:11px;color:var(--txm);margin-top:1px}
.br{font-family:var(--mn);font-size:12px;font-weight:600;color:var(--am);flex-shrink:0}
/* Bar chart */
.bar-chart{height:var(--bh);background:var(--sf);border-top:1px solid var(--bd);display:flex;align-items:flex-end;padding:6px 12px 4px;gap:2px;overflow-x:auto;overflow-y:hidden;flex-shrink:0}
.bar-chart::-webkit-scrollbar{height:4px}.bar-chart::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:18px;max-width:40px;cursor:pointer;position:relative}
.bar-col .bar-fill{width:100%;min-height:2px;border-radius:3px 3px 0 0;transition:height .4s ease}
.bar-col .bar-lbl{font-size:7px;color:var(--txm);writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);height:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;pointer-events:none}
.bar-col:hover .bar-fill{opacity:.8}
.bar-col.active .bar-fill{outline:2px solid var(--ac);outline-offset:1px}
/* Dots */
.area-dot{border-radius:50%;cursor:pointer;transition:all .15s;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.area-dot:hover{transform:scale(1.35);box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:100!important}
.area-dot.selected{transform:scale(1.4);box-shadow:0 0 0 3px rgba(37,99,235,.35),0 2px 8px rgba(0,0,0,.2)}
.area-label{font-family:var(--ft);font-weight:600;color:var(--tx);text-shadow:0 0 4px var(--sf),0 0 4px var(--sf),0 1px 2px rgba(255,255,255,.9);white-space:nowrap;pointer-events:none}
.area-label.nb{font-size:11px}.area-label.tg{font-size:10px;color:var(--txd);letter-spacing:.03em;text-transform:uppercase}
.legend{position:absolute;bottom:24px;left:16px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;z-index:800;min-width:170px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.legend h5{font-size:10px;font-weight:600;color:var(--txd);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.legend-bar{height:8px;border-radius:4px;margin-bottom:4px}
.legend-lbl{display:flex;justify-content:space-between;font-family:var(--mn);font-size:10px;color:var(--txm)}
.leaflet-container{background:var(--bg)!important}
.leaflet-control-zoom{border:1px solid var(--bd)!important;border-radius:8px!important;overflow:hidden}
.leaflet-control-zoom a{background:var(--sf)!important;color:var(--tx)!important;border-color:var(--bd)!important;width:32px!important;height:32px!important;line-height:32px!important;font-size:15px!important}
.leaflet-control-zoom a:hover{background:var(--sf2)!important}
.leaflet-control-attribution{display:none!important}
.leaflet-popup-content-wrapper{background:var(--sf)!important;color:var(--tx)!important;border:1px solid var(--bd)!important;border-radius:8px!important;box-shadow:0 4px 16px rgba(0,0,0,.1)!important}
.leaflet-popup-tip{background:var(--sf)!important}
.leaflet-popup-content{font-family:var(--ft)!important;font-size:13px!important;margin:10px 14px!important}
.nh-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--gn);background:rgba(22,163,74,.4);box-shadow:0 0 4px rgba(22,163,74,.3)}
.builder-wrap{position:relative}
.builder-btn{font-family:var(--ft);font-size:12px;font-weight:500;padding:5px 12px;border:1px solid var(--bd);background:var(--sf2);color:var(--txd);border-radius:6px;cursor:pointer;white-space:nowrap;transition:.2s}
.builder-btn:hover{color:var(--tx);border-color:var(--ac)}
.builder-panel{display:none;position:absolute;top:calc(100% + 8px);right:0;width:260px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.12);z-index:1100;overflow:hidden}
.builder-panel.open{display:block}
.bp-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:600;color:var(--txd)}
.bp-actions{display:flex;gap:4px}
.bp-actions button{font-family:var(--ft);font-size:10px;padding:3px 8px;border:1px solid var(--bd);background:var(--sf2);color:var(--txd);border-radius:4px;cursor:pointer}
.bp-list{max-height:300px;overflow-y:auto;padding:6px 0}
.bp-item{display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer}
.bp-item:hover{background:var(--sf2)}
.bp-item input{accent-color:var(--gn);width:13px;height:13px}
.bp-item .bp-name{font-size:12px;flex:1}
.bp-item .bp-count{font-family:var(--mn);font-size:10px;color:var(--txm)}
.bp-loading{padding:16px;text-align:center;font-size:12px;color:var(--txm)}
@media(max-width:900px){.sb{position:fixed;left:0;right:0;bottom:var(--bh);width:100%;height:55vh;border-left:none;border-top:1px solid var(--bd);border-radius:16px 16px 0 0;transform:translateY(100%);z-index:900}.sb.open{transform:translateY(0)}.brand .sub,.ctrl label{display:none}header{padding:0 10px;gap:6px}}
</style>
</head>
<body>
<header>
  <div class="brand"><div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg></div><div><h1>NC Metro Dashboard</h1><span class="sub">Neighborhood Explorer</span></div></div>
  <div class="metro-tabs" id="metroTabs"><button class="active" data-m="charlotte">Charlotte</button><button data-m="raleigh">Raleigh</button></div>
  <div class="ctrl"><label>Color by</label><select id="colorMetric"><option value="median_household_income">Household Income</option><option value="median_home_value">Home Value</option><option value="median_age">Median Age</option><option value="pct_family_households">% Family HH</option><option value="pct_bachelors_or_higher">% Bachelor's+</option><option value="crime_rate">Crime Rate</option></select></div>
  <div class="hdr-r">
    
    <label class="tog"><input type="checkbox" id="showLabels" checked> Labels</label>
  </div>
</header>
<div class="app">
  <div class="map-row">
    <div id="map"></div>
    <div class="sb" id="sidebar">
      <div class="sb-empty" id="sbEmpty"><div class="sb-empty-ic"><svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5"/></svg></div><h3>Select a Neighborhood</h3><p>Click any dot on the map to explore demographics, housing data, and local restaurants.</p></div>
      <div id="sbDetail"></div>
    </div>
  </div>
  <div class="bar-chart" id="barChart"></div>
</div>
<div class="legend" id="legend"><h5 id="legTitle"></h5><div class="legend-bar" id="legBar"></div><div class="legend-lbl"><span id="legMin"></span><span id="legMax"></span></div></div>
<script>
(function(){
// Green-to-red palette: green=good, red=bad
const GR=['#15803d','#16a34a','#22c55e','#86efac','#fde68a','#fbbf24','#f87171','#dc2626'];
const RG=['#dc2626','#f87171','#fbbf24','#fde68a','#86efac','#22c55e','#16a34a','#15803d'];// reversed
const VIEWS={charlotte:{center:[35.25,-80.85],zoom:10},raleigh:{center:[35.75,-78.70],zoom:9}};
const MK={
  median_household_income:{label:'Median HH Income',fmt:v=>'$'+v.toLocaleString(),colors:RG,domain:[30000,170000],min:'$30k',max:'$170k',higher:'better'},
  median_home_value:{label:'Median Home Value',fmt:v=>'$'+v.toLocaleString(),colors:RG,domain:[100000,900000],min:'$100k',max:'$900k',higher:'better'},
  median_age:{label:'Median Age',fmt:v=>v.toFixed(1),colors:['#60a5fa','#93c5fd','#dbeafe','#fef3c7','#fde68a','#fcd34d','#f59e0b','#d97706'],domain:[25,50],min:'25',max:'50',higher:'neutral'},
  pct_family_households:{label:'% Family HH',fmt:v=>v.toFixed(1)+'%',colors:['#fecaca','#fde68a','#d9f99d','#86efac','#4ade80','#22c55e','#16a34a','#15803d'],domain:[10,80],min:'10%',max:'80%',higher:'better'},
  pct_bachelors_or_higher:{label:"% Bachelor's+",fmt:v=>v.toFixed(1)+'%',colors:RG,domain:[15,90],min:'15%',max:'90%',higher:'better'},
  crime_rate:{label:'Crime Rate /1k',fmt:v=>v.toFixed(1),colors:GR,domain:[5,80],min:'5',max:'80',higher:'worse'}
};
let curMetro='charlotte',curMetric='median_household_income';
let profiles=null,restData=null,selectedId=null;
let areaLayers={},areaLabels={},areasGroup=L.layerGroup(),labelsGroup=L.layerGroup();

const map=L.map('map',{center:VIEWS.charlotte.center,zoom:VIEWS.charlotte.zoom,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
areasGroup.addTo(map);labelsGroup.addTo(map);

function getColor(val,metric){
  const c=MK[metric],t=Math.max(0,Math.min(1,(val-c.domain[0])/(c.domain[1]-c.domain[0])));
  return c.colors[Math.min(c.colors.length-1,Math.floor(t*c.colors.length))];
}

async function boot(){
  const[pf,cG,rG]=await Promise.all([
    fetch('area-profiles.json').then(r=>r.json()),
    fetch('areas-charlotte.geojson').then(r=>r.json()),
    fetch('areas-raleigh.geojson').then(r=>r.json())
  ]);
  profiles=pf;
  try{restData=await fetch('restaurants.json').then(r=>{if(!r.ok)throw 0;return r.json()});}catch(e){restData={restaurants:{}};}
  addAreas(cG,'charlotte');addAreas(rG,'raleigh');
  updateColors();renderBarChart();filterMetro(curMetro);
  
}

function addAreas(geo,metro){
  geo.features.forEach(f=>{
    const id=f.properties.id,name=f.properties.name,prof=profiles?.areas[id];
    const isNb=prof?.type==='neighborhood',sz=18;
    const c=f.geometry.coordinates,lat=c[1],lng=c[0];
    const di=L.divIcon({className:'',html:'<div class="area-dot'+(isNb?' nb':' tg')+'" id="dot-'+id+'" style="width:'+sz+'px;height:'+sz+'px"></div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    const dot=L.marker([lat,lng],{icon:di});
    dot.bindTooltip(name,{direction:'top',offset:[0,-12]});
    dot.on('click',()=>selectArea(id));
    dot._metro=metro;dot._id=id;areaLayers[id]=dot;areasGroup.addLayer(dot);
    const lbl=L.marker([lat,lng],{icon:L.divIcon({className:'area-label '+(isNb?'nb':'tg'),html:name,iconSize:[0,0],iconAnchor:[0,-12]})});
    lbl._metro=metro;lbl._id=id;areaLabels[id]=lbl;labelsGroup.addLayer(lbl);
  });
}

function updateColors(){
  const c=MK[curMetric];
  Object.entries(areaLayers).forEach(([id,mk])=>{
    const p=profiles?.areas[id],v=p?.[curMetric]??0;
    const el=document.getElementById('dot-'+id);
    if(el)el.style.background=getColor(v,curMetric);
  });
  document.getElementById('legTitle').textContent=c.label;
  document.getElementById('legMin').textContent=c.min;
  document.getElementById('legMax').textContent=c.max;
  document.getElementById('legBar').style.background='linear-gradient(to right,'+c.colors.join(',')+')';
}

function renderBarChart(){
  const bc=document.getElementById('barChart');
  const c=MK[curMetric];
  const metroAreas=Object.entries(profiles.areas).filter(([k,v])=>v.metro===curMetro);
  // Sort: for "worse" metrics (crime) sort ascending so worst is right; otherwise sort ascending (lowest left)
  metroAreas.sort((a,b)=>(a[1][curMetric]||0)-(b[1][curMetric]||0));
  const vals=metroAreas.map(([k,v])=>v[curMetric]||0);
  const maxV=Math.max(...vals,1);
  const maxH=55;// max bar height px
  bc.innerHTML=metroAreas.map(([id,a])=>{
    const v=a[curMetric]||0;
    const h=Math.max(2,Math.round((v/maxV)*maxH));
    const col=getColor(v,curMetric);
    const isActive=id===selectedId?' active':'';
    return '<div class="bar-col'+isActive+'" data-id="'+id+'" title="'+a.name+': '+c.fmt(v)+'"><div class="bar-fill" style="height:'+h+'px;background:'+col+'"></div><div class="bar-lbl">'+a.name+'</div></div>';
  }).join('');
  bc.querySelectorAll('.bar-col').forEach(el=>{el.addEventListener('click',()=>selectArea(el.dataset.id));});
}

function filterMetro(metro){
  curMetro=metro;
  Object.values(areaLayers).forEach(l=>{if(l._metro===metro)areasGroup.addLayer(l);else areasGroup.removeLayer(l);});
  Object.values(areaLabels).forEach(l=>{if(l._metro===metro&&document.getElementById('showLabels').checked)labelsGroup.addLayer(l);else labelsGroup.removeLayer(l);});
  
  map.flyTo(VIEWS[metro].center,VIEWS[metro].zoom,{duration:1});
  renderBarChart();
}

function selectArea(id){
  if(selectedId){const p=document.getElementById('dot-'+selectedId);if(p)p.classList.remove('selected');}
  selectedId=id;
  const dot=document.getElementById('dot-'+id);if(dot)dot.classList.add('selected');
  renderSidebar(id);renderBarChart();
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar').scrollTop=0;
}

function renderSidebar(id){
  const a=profiles?.areas[id];if(!a)return;
  document.getElementById('sbEmpty').style.display='none';
  const d=document.getElementById('sbDetail');d.style.display='block';
  const ma=Object.values(profiles.areas).filter(x=>x.metro===(a.metro||curMetro));
  function avg(k){const v=ma.map(x=>x[k]).filter(x=>x!=null);return v.length?Math.round(v.reduce((s,x)=>s+x,0)/v.length):0;}
  function pct(k){const v=ma.map(x=>x[k]).filter(x=>x!=null).sort((a,b)=>a-b);const i=v.indexOf(a[k]);return v.length>1?Math.round((i/(v.length-1))*100):50;}
  function arrow(k,v){const av=avg(k);if(!av||!v)return'';const d=v-av;if(Math.abs(d/av)<.03)return'';const up=d>0;const cfg=MK[k];
    if(cfg.higher==='better')return up?'<span class="arrow up">▲</span>':'<span class="arrow down">▼</span>';
    if(cfg.higher==='worse')return up?'<span class="arrow down">▲</span>':'<span class="arrow up">▼</span>';
    return'';}
  const rests=restData?.restaurants?.[id]||[];
  const isNb=a.type==='neighborhood';
  const cards=[
    {key:'median_household_income',label:'Median HH Income',color:'#16a34a'},
    {key:'median_home_value',label:'Median Home Value',color:'#7c3aed'},
    {key:'median_age',label:'Median Age',color:'#d97706'},
    {key:'pct_family_households',label:'% Family HH',color:'#16a34a'},
    {key:'pct_bachelors_or_higher',label:"% Bachelor's+",color:'#059669'},
    {key:'crime_rate',label:'Crime Rate /1,000',color:'#dc2626'}
  ];
  d.innerHTML=
    '<div class="sb-hd"><span class="badge '+(isNb?'nb':'tg')+'">'+(isNb?'Neighborhood':'Town / Area')+'</span><h2>'+a.name+'</h2>'+(a.towns?'<div class="sb-towns">'+a.towns.join(' · ')+'</div>':'')+'</div>'+
    '<div class="sb-blurb">'+a.blurb+'</div>'+
    '<div class="sb-sec"><div class="sb-sec-t">Population</div><div class="pop-row"><div class="pop-c"><div class="l">Population</div><div class="v">'+a.total_population.toLocaleString()+'</div></div><div class="pop-c"><div class="l">Households</div><div class="v">'+a.total_households.toLocaleString()+'</div></div></div></div>'+
    '<div class="sb-sec" style="padding-top:0"><div class="sb-sec-t">Metrics</div>'+
      cards.map(m=>{const v=a[m.key],p=pct(m.key),av=avg(m.key),cfg=MK[m.key];if(v==null)return'';
        return'<div class="mc"><div><div class="ml">'+m.label+'</div><div class="mv">'+cfg.fmt(v)+arrow(m.key,v)+'</div></div><div class="mr"><div class="mp">Avg '+cfg.fmt(av)+'</div><div class="mb"><div class="mbf" style="width:'+p+'%;background:'+m.color+'"></div></div></div></div>';}).join('')+
    '</div>'+
    '<div class="sb-sec" style="padding-top:0"><div class="sb-sec-t">Market Notes</div>'+
      '<div class="nc"><div class="nl"><span class="dot" style="background:var(--gn)"></span>New Construction</div><div class="nt">'+a.new_construction_note+'</div></div>'+
      '<div class="nc"><div class="nl"><span class="dot" style="background:var(--ac)"></span>Resale Activity</div><div class="nt">'+a.resale_activity+'</div></div></div>'+
    (rests.length?'<div class="sb-sec" style="padding-top:0"><div class="sb-sec-t">Top Restaurants</div>'+rests.map(r=>'<div class="bc"><div class="bi">🍽</div><div class="binfo"><div class="bn">'+r.name+'</div><div class="bm">'+r.cuisine+(r.price?' · '+r.price:'')+'</div></div>'+(r.rating?'<div class="br">'+r.rating+' ★</div>':'')+'</div>').join('')+'</div>':'');
}

// Events
document.querySelectorAll('.metro-tabs button').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.metro-tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');filterMetro(b.dataset.m);});});
document.getElementById('colorMetric').addEventListener('change',e=>{curMetric=e.target.value;updateColors();renderBarChart();if(selectedId)renderSidebar(selectedId);});
document.getElementById('showLabels').addEventListener('change',()=>{const on=document.getElementById('showLabels').checked;Object.values(areaLabels).forEach(l=>{if(on&&l._metro===curMetro)labelsGroup.addLayer(l);else labelsGroup.removeLayer(l);});});
map.on('click',e=>{if(!e.originalEvent.target.closest('.area-dot')&&!e.originalEvent.target.closest('.nh-dot')&&!e.originalEvent.target.closest('.leaflet-popup')){if(selectedId){const p=document.getElementById('dot-'+selectedId);if(p)p.classList.remove('selected');selectedId=null;document.getElementById('sbDetail').style.display='none';document.getElementById('sbEmpty').style.display='flex';document.getElementById('sidebar').classList.remove('open');renderBarChart();}}});

boot();
})();
</script>
</body>
</html>
